name: Release web to k3s

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag, e.g. v0.1.0"
        required: true
        default: "latest"

permissions:
  contents: write
  packages: write

jobs:
  build-push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/hostyourself" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ${{ steps.image.outputs.name }}:${{ github.event.inputs.version }} \
            -t ${{ steps.image.outputs.name }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.event.inputs.version }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Update Kubernetes image tag
        run: |
          sed -i "s/newTag: .*/newTag: ${{ github.event.inputs.version }}/" deploy/k8s/kustomization.yaml

      - name: Commit deployment update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deploy/k8s/kustomization.yaml
          git commit -m "Release HostYourself ${{ github.event.inputs.version }}" || echo "No changes to commit"
          git push